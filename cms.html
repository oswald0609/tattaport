<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CMS — SHOTA INOUE Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@200;300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1d1e1e;
  --panel:#2a2b2b;
  --panel-2:#323333;
  --accent:#50F0D2;
  --accent-2:#3bcfb3;
  --danger:#f04650;
  --text:#E1E2E2;
  --text-mid:rgba(225,226,226,.68);
  --text-dim:rgba(225,226,226,.42);
  --border:rgba(225,226,226,.12);
  --ff-disp:'MuseoModerno',sans-serif;
  --ff-sm:'Bricolage Grotesque',sans-serif;
  --ff-jp:'Noto Sans JP',sans-serif;
  --eoe:cubic-bezier(0.16,1,0.3,1);
}
html,body{background:var(--bg);color:var(--text);font-family:var(--ff-jp);min-height:100vh}
body{padding-bottom:6rem}

/* HEADER */
.cms-header{
  background:var(--panel);
  padding:1.4rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.cms-title{
  font-family:var(--ff-disp);font-weight:300;
  font-size:1.4rem;letter-spacing:.18em;
  color:var(--accent);text-transform:uppercase;
}
.header-actions{display:flex;gap:.7rem;align-items:center}

/* LAYOUT */
.cms-body{
  max-width:1200px;margin:2rem auto;
  padding:0 2rem;
  display:grid;grid-template-columns:280px 1fr;gap:2rem;
}

/* SIDEBAR */
.sidebar{
  background:var(--panel);
  border-radius:8px;padding:1.2rem;
  position:sticky;top:6rem;
  height:fit-content;max-height:calc(100vh - 8rem);
  overflow-y:auto;
}
.sidebar h3{
  font-family:var(--ff-sm);font-weight:500;font-size:11px;
  letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;
  margin-bottom:.8rem;padding-left:.4rem;
}
.cat-list{list-style:none;display:flex;flex-direction:column;gap:.2rem;margin-bottom:.5rem}
.cat-row{
  display:flex;align-items:center;gap:.4rem;
}
.cat-item{
  flex:1;
  background:none;border:none;
  padding:.6rem .7rem;text-align:left;
  font-family:var(--ff-jp);font-size:13px;color:var(--text);
  border-radius:4px;cursor:pointer;
  transition:background .15s;
  display:flex;align-items:center;gap:.5rem;
}
.cat-item:hover{background:var(--panel-2)}
.cat-item.active{background:var(--panel-2);color:var(--accent);font-weight:500}
.cat-item .count{
  font-family:var(--ff-sm);font-size:10px;color:var(--text-dim);
  margin-left:auto;
}
.cat-icon-btn{
  background:none;border:none;color:var(--text-dim);
  font-size:13px;width:22px;height:22px;
  cursor:pointer;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.cat-icon-btn:hover{background:var(--panel-2);color:var(--accent)}
.cat-icon-btn.danger:hover{color:var(--danger)}

.sidebar-section{margin-bottom:1.5rem}

.work-list{list-style:none;display:flex;flex-direction:column;gap:.15rem}
.work-list-item{
  display:flex;align-items:center;gap:.4rem;
}
.work-btn{
  flex:1;
  background:none;border:1px solid transparent;
  padding:.55rem .7rem;text-align:left;
  font-family:var(--ff-jp);font-size:12px;color:var(--text-mid);
  border-radius:4px;cursor:pointer;
  transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.work-btn:hover{background:var(--panel-2);color:var(--text)}
.work-btn.active{
  background:var(--panel-2);color:var(--accent);
  border-color:var(--accent);
}

/* CONTENT */
.content{
  background:var(--panel);
  border-radius:8px;
  padding:2rem;
}
.content-empty{
  text-align:center;padding:5rem 2rem;
  color:var(--text-dim);font-size:13px;
}

.section{margin-bottom:2.4rem}
.section-title{
  font-family:var(--ff-sm);font-weight:500;font-size:11px;
  letter-spacing:.18em;color:var(--accent);text-transform:uppercase;
  margin-bottom:1rem;padding-bottom:.5rem;
  border-bottom:1px solid var(--border);
}

/* FORM */
.field{margin-bottom:1rem}
.field-label{
  display:block;
  font-family:var(--ff-sm);font-size:11px;
  letter-spacing:.06em;color:var(--text-dim);text-transform:uppercase;
  margin-bottom:.4rem;
}
.field input,.field textarea,.field select{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  padding:.65rem .8rem;border-radius:4px;
  font-family:var(--ff-jp);font-size:13px;
  transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--accent);
}
.field textarea{min-height:90px;resize:vertical;line-height:1.7}

.field-row{
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;
}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  font-family:var(--ff-sm);font-weight:500;font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;
  padding:.65rem 1.2rem;border-radius:4px;
  cursor:pointer;border:1px solid transparent;
  transition:all .2s;
  background:var(--panel-2);color:var(--text);
}
.btn:hover{background:#3a3b3b}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent-2)}
.btn-ghost{background:none;border-color:var(--border);color:var(--text-mid)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:none}
.btn-danger{background:var(--danger);color:var(--text)}
.btn-danger:hover{background:#c8323c}
.btn-sm{padding:.4rem .8rem;font-size:10px}

/* IMAGES */
.images-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:.8rem;
  margin-top:1rem;
}
.img-card{
  position:relative;
  aspect-ratio:1/1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:4px;
  overflow:hidden;
  cursor:grab;
}
.img-card.dragging{opacity:.4}
.img-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.img-card img{
  width:100%;height:100%;object-fit:cover;
  pointer-events:none;
}
.img-card .img-actions{
  position:absolute;top:6px;right:6px;
  display:flex;gap:4px;opacity:0;
  transition:opacity .2s;
}
.img-card:hover .img-actions{opacity:1}
.img-card .img-actions button{
  background:rgba(0,0,0,.7);color:var(--text);
  border:none;width:26px;height:26px;border-radius:3px;
  cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.img-card .img-actions button:hover{background:rgba(240,70,80,.85)}
.img-card .img-thumb-badge{
  position:absolute;bottom:6px;left:6px;
  background:var(--accent);color:var(--bg);
  font-family:var(--ff-sm);font-size:9px;font-weight:600;
  letter-spacing:.1em;padding:3px 7px;border-radius:2px;
  text-transform:uppercase;
}
.img-card .img-cols-select{
  position:absolute;bottom:6px;right:6px;
  background:rgba(0,0,0,.7);color:var(--text);
  border:1px solid var(--border);
  font-size:10px;padding:2px 4px;border-radius:3px;
  font-family:var(--ff-sm);
  cursor:pointer;
}

.img-upload{
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1/1;
  background:var(--bg);
  border:2px dashed var(--border);
  border-radius:4px;
  cursor:pointer;
  font-family:var(--ff-sm);font-size:11px;letter-spacing:.1em;
  color:var(--text-dim);text-transform:uppercase;
  transition:all .2s;
}
.img-upload:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(80,240,210,.05);
}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:var(--bg);
  padding:.8rem 1.4rem;border-radius:4px;
  font-family:var(--ff-sm);font-weight:500;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;
  z-index:1000;
  transition:transform .35s var(--eoe);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--danger);color:var(--text)}

/* MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:none;align-items:center;justify-content:center;
  padding:2rem;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel);border-radius:8px;
  padding:2rem;max-width:420px;width:100%;
}
.modal h3{
  font-family:var(--ff-disp);font-weight:300;font-size:1.1rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
  margin-bottom:1.2rem;
}
.modal .field-row{margin-top:.5rem}
.modal-actions{
  display:flex;gap:.6rem;justify-content:flex-end;
  margin-top:1.5rem;
}

/* Help */
.help-text{
  font-size:11px;color:var(--text-dim);
  line-height:1.6;margin-top:.4rem;
}

/* RESPONSIVE */
@media(max-width:880px){
  .cms-body{grid-template-columns:1fr;padding:0 1rem}
  .sidebar{position:static;max-height:none}
  .field-row{grid-template-columns:1fr}
  .cms-header{padding:1.2rem 1rem}
  .header-actions{gap:.4rem}
  .btn{padding:.55rem .9rem}
}
</style>
</head>
<body>

<header class="cms-header">
  <h1 class="cms-title">CMS — Portfolio</h1>
  <div class="header-actions">
    <span id="storageUsage" style="font-family:var(--ff-sm);font-size:10px;color:var(--text-dim);letter-spacing:.06em;margin-right:.5rem"></span>
    <button class="btn btn-ghost" id="exportBtn">Export JSON</button>
    <button class="btn btn-primary" id="exportZipBtn">Export ZIP</button>
    <button class="btn btn-ghost" id="importBtn">Import</button>
    <input type="file" id="importFile" accept="application/json,application/zip,.zip,.json" style="display:none">
    <a class="btn" href="index.html?preview=1" target="_blank" id="previewBtn">Preview</a>
  </div>
</header>

<div class="cms-body">

  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>Pages</h3>
      <ul class="cat-list">
        <li class="cat-row">
          <button class="cat-item" id="logoPageBtn">
            Logo <span class="count" id="logoStatus">—</span>
          </button>
        </li>
        <li class="cat-row">
          <button class="cat-item" id="homeBgPageBtn">
            Home BG Slides <span class="count" id="homeBgCount">0</span>
          </button>
        </li>
        <li class="cat-row">
          <button class="cat-item" id="profilePageBtn">
            Profile <span class="count" id="profileImgCount">0</span>
          </button>
        </li>
      </ul>
    </div>

    <div class="sidebar-section">
      <h3>Categories</h3>
      <ul class="cat-list" id="catList"></ul>
      <button class="btn btn-sm btn-ghost" id="addCatBtn" style="width:100%;margin-top:.4rem;justify-content:center">+ Add Category</button>
    </div>

    <div class="sidebar-section">
      <h3 id="worksHeader">Works</h3>
      <ul class="work-list" id="workList"></ul>
      <button class="btn btn-sm btn-ghost" id="addWorkBtn" style="width:100%;margin-top:.6rem;justify-content:center">+ Add Work</button>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="content-empty">作品を選択するか、新規作成してください。</div>
  </main>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL: Add Category -->
<div class="modal-bg" id="catModal">
  <div class="modal">
    <h3 id="catModalTitle">New Category</h3>
    <div class="field">
      <label class="field-label">Category Name</label>
      <input type="text" id="catName" placeholder="例: Branding">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="catCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="catSaveBtn">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Delete -->
<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <h3>Confirm Delete</h3>
    <p id="confirmText" style="color:var(--text-mid);font-size:13px;line-height:1.7"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirmCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<script>
/* ─── データ構造 ──────────────────────────
WORKS_DATA: [
  { cat: 'Branding', items: [
    {
      id: 'sotoya-rebrand',
      tag: 'Branding',
      title: 'タイトル',
      desc: '説明文',
      lead: 'リード文(詳細ページ)',
      meta: { client, year, artDirection, design, direction, tools },
      images: [ { src: 'data:image/...', cols: 1 }, ... ]
    }
  ]},
  ...
]
*/

const STORAGE_KEY = 'worksData';
const PROFILE_KEY = 'profileData';
const LOGO_KEY = 'logoData';
const HOMEBG_KEY = 'homeBgData';
let DATA = [];
let PROFILE = { images: [] };
let LOGO = { src: '' };
let HOME_BG = { images: [] };
let currentCat = null;
let currentItem = null;
let currentPage = null;    // 'profile' | 'logo' | 'homebg' | null

/* ─── UTIL ─── */
function uid(){
  return 'w_' + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
}
function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', type === 'error');
  t.classList.add('show');
  clearTimeout(toast._tid);
  toast._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ─── ストレージ ─── */
function load(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      DATA = JSON.parse(raw);
      DATA.forEach(g => g.items.forEach(it => {
        if(!it.images) it.images = [];
        if(!it.meta) it.meta = {};
        if(!('lead' in it)) it.lead = it.desc || '';
      }));
    } else {
      DATA = getDefaultData();
    }
    const pRaw = localStorage.getItem(PROFILE_KEY);
    if(pRaw){
      PROFILE = JSON.parse(pRaw);
      if(!PROFILE.images) PROFILE.images = [];
    }
    const lRaw = localStorage.getItem(LOGO_KEY);
    if(lRaw){
      LOGO = JSON.parse(lRaw);
      if(!LOGO.src) LOGO.src = '';
    }
    const hRaw = localStorage.getItem(HOMEBG_KEY);
    if(hRaw){
      HOME_BG = JSON.parse(hRaw);
      if(!HOME_BG.images) HOME_BG.images = [];
    }
  } catch(e){
    console.error(e);
    DATA = getDefaultData();
    PROFILE = { images: [] };
    LOGO = { src: '' };
    HOME_BG = { images: [] };
  }
}
function save(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    localStorage.setItem(PROFILE_KEY, JSON.stringify(PROFILE));
    localStorage.setItem(LOGO_KEY, JSON.stringify(LOGO));
    localStorage.setItem(HOMEBG_KEY, JSON.stringify(HOME_BG));
    updateStorageUsage();
  } catch(e){
    updateStorageUsage();
    toast('容量超過しました。Export ZIP でバックアップして、不要画像を減らしてください', 'error');
  }
}

function updateStorageUsage(){
  const el = document.getElementById('storageUsage');
  if(!el) return;
  let total = 0;
  for(const key of [STORAGE_KEY, PROFILE_KEY, LOGO_KEY, HOMEBG_KEY]){
    const v = localStorage.getItem(key);
    if(v) total += v.length;
  }
  /* localStorageの実際の上限はブラウザにより異なる(5〜10MB)。5MBを目安に */
  const mb = (total / 1024 / 1024).toFixed(1);
  const limit = 5;
  const pct = Math.round((total / 1024 / 1024 / limit) * 100);
  let color = 'var(--text-dim)';
  if(pct > 80) color = 'var(--danger)';
  else if(pct > 60) color = '#f0c84a';
  el.style.color = color;
  el.textContent = `STORAGE: ${mb}MB / ~${limit}MB (${pct}%)`;
}

function openCatModal(catName){
  const modal = document.getElementById('catModal');
  const title = document.getElementById('catModalTitle');
  const input = document.getElementById('catName');
  if(catName){
    title.textContent = 'Rename Category';
    input.value = catName;
    input.dataset.original = catName;
  } else {
    title.textContent = 'New Category';
    input.value = '';
    delete input.dataset.original;
  }
  modal.classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function closeCatModal(){
  document.getElementById('catModal').classList.remove('open');
}
function saveCatModal(){
  const input = document.getElementById('catName');
  const name = input.value.trim();
  if(!name){ toast('名前を入力してください','error'); return; }
  const original = input.dataset.original;
  if(original){
    // rename
    if(name !== original && DATA.find(g => g.cat === name)){
      toast('同名のカテゴリが既に存在します','error'); return;
    }
    const g = DATA.find(g => g.cat === original);
    g.cat = name;
    if(currentCat === original) currentCat = name;
    g.items.forEach(it => { if(it.tag === original) it.tag = name; });
  } else {
    // create
    if(DATA.find(g => g.cat === name)){
      toast('同名のカテゴリが既に存在します','error'); return;
    }
    DATA.push({cat:name, items:[]});
    currentCat = name;
  }
  save();
  closeCatModal();
  renderCategories();
  renderWorks();
  renderContent();
  toast('保存しました');
}
function deleteCategory(catName){
  const g = DATA.find(g => g.cat === catName);
  confirmAction(`カテゴリ「${catName}」と${g.items.length}件の作品を削除します。よろしいですか？`, () => {
    DATA = DATA.filter(g => g.cat !== catName);
    if(currentCat === catName){ currentCat = null; currentItem = null; }
    save();
    renderCategories();
    renderWorks();
    renderContent();
    toast('削除しました');
  });
}

/* 画像をリサイズしてBase64で保存 (WebP優先、未対応ならJPEG) */
function readImageAsResizedDataURL(file, maxW, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = img.width > maxW ? maxW / img.width : 1;
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        /* WebPで書き出し（対応してない古いブラウザはJPEGにフォールバック） */
        let dataUrl = canvas.toDataURL('image/webp', quality);
        if(!dataUrl.startsWith('data:image/webp')){
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ファイルをそのままBase64で保存（SVG/PNG透過保持用） */
function readFileAsDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  group.items.push(newItem);
  currentItem = { catName: currentCat, item: newItem, idx: group.items.length - 1 };
  save();
  renderCategories();
  renderWorks();
  renderContent();
}

function exportData(){

}

/* ZIP出力: data.json + images/ フォルダのバンドル
   画像のBase64 → 物理ファイルに変換し、JSON内のパスを書き換え */
async function exportZip(){
  if(typeof JSZip === 'undefined'){
    toast('JSZip読み込み失敗（ネット接続を確認）','error');
    return;
  }
  toast('ZIP生成中...');
  const zip = new JSZip();
  const imgFolder = zip.folder('images');

  /* ディープコピーしてパス書き換え用に */
  const works = JSON.parse(JSON.stringify(DATA));
  const profile = JSON.parse(JSON.stringify(PROFILE));
  const logo = JSON.parse(JSON.stringify(LOGO));
  const homeBg = JSON.parse(JSON.stringify(HOME_BG));

  let imgCounter = 0;
  function processImageEntry(entry, prefix){
    if(!entry.src) return;
    if(!entry.src.startsWith('data:')) return;
    const m = entry.src.match(/^data:(image\/[a-zA-Z+]+);base64,(.+)$/);
    if(!m) return;
    const mime = m[1];
    const b64 = m[2];
    const ext = mime.split('/')[1].replace('jpeg','jpg').replace('svg+xml','svg');
    imgCounter++;
    const fileName = `${prefix}-${imgCounter}.${ext}`;
    imgFolder.file(fileName, b64, {base64: true});
    entry.src = `images/${fileName}`;
  }

  works.forEach(group => {
    group.items.forEach(item => {
      if(item.images){
        item.images.forEach(img => processImageEntry(img, `work-${item.id}`));
      }
    });
  });
  if(profile.images){
    profile.images.forEach(img => processImageEntry(img, 'profile'));
  }
  if(homeBg.images){
    homeBg.images.forEach(img => processImageEntry(img, 'homebg'));
  }
  if(logo.src){
    processImageEntry(logo, 'logo');
  }

  zip.file('data.json', JSON.stringify({works, profile, logo, homeBg}, null, 2));

  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `portfolio-bundle-${new Date().toISOString().slice(0,10)}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ZIP生成完了');
}
async function importData(file){
  /* ZIPの場合: 解凍して画像をBase64化、data.json を読む */
  if(file.name.endsWith('.zip')){
    if(typeof JSZip === 'undefined'){
      toast('JSZip読み込み失敗','error');
      return;
    }
    try {
      const zip = await JSZip.loadAsync(file);
      const dataFile = zip.file('data.json');
      if(!dataFile){
        toast('data.jsonがZIPに含まれていません','error');
        return;
      }
      const dataText = await dataFile.async('string');
      const data = JSON.parse(dataText);
      const newData = data.works || [];
      const newProfile = data.profile || { images: [] };
      const newLogo = data.logo || { src: '' };
      const newHomeBg = data.homeBg || { images: [] };

      /* images/ フォルダの画像をBase64に戻す（編集中はBase64で扱う） */
      async function pathToBase64(entry){
        if(!entry.src || entry.src.startsWith('data:')) return;
        const path = entry.src;
        const f = zip.file(path);
        if(!f) return;
        const b64 = await f.async('base64');
        const ext = path.split('.').pop().toLowerCase();
        const mime = ext === 'jpg' ? 'image/jpeg' : (ext === 'svg' ? 'image/svg+xml' : `image/${ext}`);
        entry.src = `data:${mime};base64,${b64}`;
      }
      for(const g of newData){
        for(const it of g.items){
          if(it.images){
            for(const img of it.images) await pathToBase64(img);
          }
        }
      }
      if(newProfile.images){
        for(const img of newProfile.images) await pathToBase64(img);
      }
      if(newHomeBg.images){
        for(const img of newHomeBg.images) await pathToBase64(img);
      }
      if(newLogo.src){
        await pathToBase64(newLogo);
      }

      confirmAction('現在のデータを上書きします。よろしいですか？', () => {
        DATA = newData;
        PROFILE = newProfile;
        LOGO = newLogo;
        HOME_BG = newHomeBg;
        currentCat = null; currentItem = null; currentPage = null;
        save();
        updateProfileCount();
        updateLogoStatus();
        updateHomeBgCount();
        renderCategories();
        renderWorks();
        renderContent();
        toast('インポート完了');
      });
    } catch(err){
      console.error(err);
      toast('ZIPの読み込みに失敗','error');
    }
    return;
  }

  /* JSONの場合（従来通り） */
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      let newData, newProfile, newLogo, newHomeBg;
      if(Array.isArray(data)){
        newData = data;
        newProfile = PROFILE;
        newLogo = LOGO;
        newHomeBg = HOME_BG;
      } else if(data.works){
        newData = data.works;
        newProfile = data.profile || { images: [] };
        newLogo = data.logo || { src: '' };
        newHomeBg = data.homeBg || { images: [] };
      } else {
        throw new Error('Invalid');
      }
      confirmAction('現在のデータを上書きします。よろしいですか？', () => {
        DATA = newData;
        PROFILE = newProfile;
        LOGO = newLogo;
        HOME_BG = newHomeBg;
        currentCat = null; currentItem = null; currentPage = null;
        save();
        updateProfileCount();
        updateLogoStatus();
        updateHomeBgCount();
        renderCategories();
        renderWorks();
        renderContent();
        toast('インポート完了');
      });
    } catch(err){
      toast('JSONの読み込みに失敗','error');
    }
  };
  reader.readAsText(file);
}

/* ─── ESCAPE ─── */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
